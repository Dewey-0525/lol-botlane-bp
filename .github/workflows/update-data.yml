name: Update botlane dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Patchright browsers
        run: python -m patchright install chromium

      - name: Update dataset
        run: python update_data.py --with-timeline

      - name: Commit updated dataset
        run: |
          if git diff --quiet -- data/botlane_dataset.json; then
            echo "Dataset is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/botlane_dataset.json
          git commit -m "Update botlane dataset"
          git push
